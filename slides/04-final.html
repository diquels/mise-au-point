<!doctype html>
<html lang="fr"><head><meta charset="utf-8">
<title>Slide : Finale CTA</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#222;}
  .stage{width:1080px;height:1350px;position:relative;background:var(--pdp-bleu-nuit);overflow:hidden;font-family:var(--font-body);margin:0 auto;}
  .courbe{position:absolute;right:-30px;top:100px;width:240px;opacity:.7;transform:scaleX(-1);}
  .h1{font-family:var(--font-serif);font-weight:600;font-size:84px;line-height:1.05;color:var(--pdp-or-doux);text-align:center;margin:280px 80px 0;}
  .lead{font-family:var(--font-body);font-size:30px;line-height:1.5;color:#fff;text-align:center;margin:36px 140px 0;opacity:.92;}
  .cta-wrap{position:absolute;left:0;right:0;top:780px;text-align:center;}
  .cta{display:inline-block;background:var(--pdp-cuivre);color:#fff;padding:22px 48px;font-family:var(--font-body);font-weight:500;font-size:30px;letter-spacing:.02em;text-decoration:none;}
  .wave{position:absolute;left:0;right:0;bottom:0;width:100%;display:block;}
  .boussole{position:absolute;left:50%;bottom:96px;transform:translateX(-50%);width:120px;filter:brightness(0) invert(1);opacity:.95;}
  .handle{position:absolute;left:0;right:0;bottom:40px;text-align:center;color:#fff;font-size:24px;letter-spacing:.02em;}
</style></head>
<body><div class="stage" data-screen-label="D : Finale">
  <img class="courbe" src="../assets/courbe.png" alt="">
  <div class="h1">On en parle&nbsp;?</div>
  <div class="lead">Réserve un appel découverte de 30 minutes. Gratuit, sans engagement.</div>
  <div class="cta-wrap"><a class="cta" href="#">Prendre rendez-vous</a></div>
  <img class="wave" src="../assets/wave-copper-on-blue.png" alt="">
  <img class="boussole" src="../assets/boussole.png" alt="">
  <div class="handle">@pierrediquelouphotographie</div>
</div></body></html>
