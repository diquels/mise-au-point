<!doctype html>
<html lang="fr"><head><meta charset="utf-8">
<title>Slide : Question d'engagement</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#222;}
  .stage{width:1080px;height:1350px;position:relative;background:var(--pdp-bleu-nuit);overflow:hidden;font-family:var(--font-body);margin:0 auto;}
  .courbe1{position:absolute;left:30px;top:200px;width:120px;opacity:.55;transform:scaleX(-1);}
  .courbe2{position:absolute;right:60px;top:560px;width:160px;opacity:.55;}
  .q{position:absolute;left:80px;right:80px;top:300px;text-align:center;color:#fff;font-family:var(--font-body);font-size:54px;line-height:1.25;font-weight:400;}
  .icons{position:absolute;left:0;right:0;top:560px;display:flex;justify-content:center;}
  .icons img{width:540px;height:auto;}
  .wave{position:absolute;left:0;right:0;bottom:0;width:100%;display:block;}
  .boussole{position:absolute;left:50%;bottom:96px;transform:translateX(-50%);width:120px;filter:brightness(0) invert(1);opacity:.95;}
  .handle{position:absolute;left:0;right:0;bottom:40px;text-align:center;color:#fff;font-size:24px;letter-spacing:.02em;}
</style></head>
<body><div class="stage" data-screen-label="C : Question">
  <img class="courbe1" src="../assets/courbe.png" alt="">
  <img class="courbe2" src="../assets/courbe.png" alt="">
  <div class="q">Alors, pour toi le rendu est<br>plutôt dur ou plutôt doux&nbsp;?</div>
  <div class="icons"><img src="../assets/social-icons.png" alt=""></div>
  <img class="wave" src="../assets/wave-copper-on-blue.png" alt="">
  <img class="boussole" src="../assets/boussole.png" alt="">
  <div class="handle">@pierrediquelouphotographie</div>
</div></body></html>
