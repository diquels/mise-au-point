<!doctype html>
<html lang="fr"><head><meta charset="utf-8">
<title>Slide : Couverture (Layout A)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#222;}
  .stage{width:1080px;height:1350px;position:relative;background:var(--pdp-bleu-nuit);overflow:hidden;font-family:var(--font-body);margin:0 auto;}
  .courbe{position:absolute;left:-40px;top:80px;width:220px;opacity:.85;}
  .title{position:absolute;left:80px;right:80px;top:360px;text-align:center;}
  .title h1{font-family:var(--font-serif);font-weight:600;font-size:96px;line-height:1.02;color:var(--pdp-or-doux);margin:0;}
  .pill{display:inline-block;margin-top:28px;padding:10px 32px 12px;border-radius:999px;background:#fff;color:var(--pdp-bleu-nuit);font-family:var(--font-serif);font-style:italic;font-size:36px;}
  .sub{font-family:var(--font-serif);font-style:italic;font-weight:400;font-size:38px;color:#fff;margin-top:38px;opacity:.92;}
  .wave{position:absolute;left:0;right:0;bottom:0;width:100%;display:block;}
  .boussole{position:absolute;left:50%;bottom:96px;transform:translateX(-50%);width:120px;filter:brightness(0) invert(1);opacity:.95;}
  .handle{position:absolute;left:0;right:0;bottom:40px;text-align:center;color:#fff;font-size:24px;letter-spacing:.02em;}
</style></head>
<body><div class="stage" data-screen-label="A : Couverture">
  <img class="courbe" src="../assets/courbe.png" alt="">
  <div class="title">
    <h1>Contre-jour lisible</h1>
    <div><span class="pill">en 3 gestes…</span></div>
    <div class="sub">…et 50 cm de mouvement</div>
  </div>
  <img class="wave" src="../assets/wave-copper-on-blue.png" alt="">
  <img class="boussole" src="../assets/boussole.png" alt="">
  <div class="handle">@pierrediquelouphotographie</div>
</div></body></html>
