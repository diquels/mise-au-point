<!doctype html>
<html lang="fr"><head><meta charset="utf-8">
<title>Slide : Contenu (Layout B)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#222;}
  .stage{width:1080px;height:1350px;position:relative;background:var(--pdp-cuivre);overflow:hidden;font-family:var(--font-body);margin:0 auto;}
  .h2{font-family:var(--font-serif);font-weight:600;font-size:78px;line-height:1.05;color:var(--pdp-bleu-nuit);text-align:center;margin:130px 80px 0;}
  .body{margin:60px 110px 0;color:#fff;font-size:30px;line-height:1.55;text-align:justify;hyphens:auto;}
  .body p+p{margin-top:24px;}
  .body strong{font-weight:700;}
  .wave{position:absolute;left:0;right:0;bottom:0;width:100%;display:block;}
  .boussole{position:absolute;left:50%;bottom:96px;transform:translateX(-50%);width:120px;filter:brightness(0) invert(1);opacity:.95;}
  .handle{position:absolute;left:0;right:0;bottom:40px;text-align:center;color:#fff;font-size:24px;letter-spacing:.02em;}
</style></head>
<body><div class="stage" data-screen-label="B : Problème ressenti">
  <h2 class="h2">Problème ressenti</h2>
  <div class="body">
    <p>Au <strong>contre-jour</strong>, l'écran s'éteint, les couleurs se ferment, le sujet décroche. Le <strong>geste</strong> manque, la <strong>mesure</strong> aussi.</p>
    <p>Trois ajustements simples, et la lumière redevient lisible, sans matériel supplémentaire.</p>
  </div>
  <img class="wave" src="../assets/wave-blue-on-copper.png" alt="">
  <img class="boussole" src="../assets/boussole.png" alt="">
  <div class="handle">@pierrediquelouphotographie</div>
</div></body></html>
